<script>
    document.querySelectorAll('.star-rating:not(.readonly) label').forEach(star => {
        star.addEventListener('click', function() {
            this.style.transform = 'scale(1.2)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 200);
        });
    });
    
    window.onload=()=>{
		const deleteBtnList = document.getElementsByClassName('deleteBtn');
		for(const deleteModal of deleteBtnList){
			deleteModal.addEventListener('click',()=>{
				$('#modalDelete').modal('show');
			});
		}

		
		const blockBtnList = document.getElementsByClassName('blockBtn');
		for(const blockModal of blockBtnList){
			blockModal.addEventListener('click',()=>{
				$('#modalBlock').modal('show');
			});
		}
	}
</script>
