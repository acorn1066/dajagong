		            <option value="publisher">아이디</option>
		        </select>
		    </div>

		            <button class="btn btn-outline-primary" type="button">검색하기</button>

		    </div>

		<table class="table table-hover text-center align-middle mt-2">

          </tr>
          </thead>
          <tbody>
          <tr>
            <th>1</th>
            <td>Mark</td>
            <td>Otto</td>
            <td>@mdo</td>
            <td>@twitter</td>
            <td>@twitter</td>
            <td><span class="badge rounded-pill bg-success text-white">정상</span></td>
            <td><button type="button" class="btn btn-outline-info" onclick="location.href='/admin/member-activity'">이력보기</button></td>
            <td><button type="button" class="btn btn-outline-danger blockBtn">차단관리</button></td>
          </tr>
          <tr>
            <th>2</th>
            <td>Jacob</td>
            <td>Thornton</td>
            <td>@fat</td>
            <td>@twitter</td>
            <td>@twitter</td>
            <td><span class="badge rounded-pill bg-success text-white">정상</span></td>
            <td><button type="button" class="btn btn-outline-info" onclick="location.href='/admin/member-activity'">이력보기</button></td>
            <td><button type="button" class="btn btn-outline-danger blockBtn">차단관리</button></td>
          </tr>
          <tr>
            <th>3</th>
            <td>Jacob</td>
            <td>Thornton</td>
            <td>@twitter</td>
            <td>@twitter</td>
            <td>@twitter</td>
            <td><span class="badge rounded-pill bg-danger text-white">차단</span></td>
            <td><button type="button" class="btn btn-outline-info" onclick="location.href='/admin/member-activity'">이력보기</button></td>
            <td><button type="button" class="btn btn-outline-danger blockBtn">차단관리</button></td>
          </tr>
          </tbody>
        </table>
        
        <div class="mx-auto border-0 align-items-center"> 
	        <nav aria-label="Standard pagination example">
	          <ul class="pagination justify-content-center">
	            <li class="page-item">
	              <a class="page-link" href="#" aria-label="Previous">
	                <span aria-hidden="true">«</span>
	              </a>
	            </li>
	            <li class="page-item"><a class="page-link" href="#">1</a></li>
	            <li class="page-item"><a class="page-link" href="#">2</a></li>
	            <li class="page-item"><a class="page-link" href="#">3</a></li>

	                <span aria-hidden="true">»</span>
	              </a>
	            </li>
	          </ul>
	        </nav>
	      </div>
	</div>
	
	<div class="modal fade noto-sans-kr" tabindex="-1" role="dialog" id="modalBlock">
	    <div class="modal-dialog">
	        <div class="modal-content rounded-3 shadow overflow-hidden">
	            <div class="modal-body p-4">
	                <div class="bg-light rounded p-3 mb-3 d-flex justify-content-between align-items-center">
					    <div class="d-flex align-items-center gap-2">
					        <span class="badge rounded-pill text-bg-success">정상</span>
					        <span class="fw-bold">아이디</span>
					        <span class="text-body-secondary small">닉네임</span>
					    </div>
					</div>
	                <hr class="hr-1">
	                <div class="form-floating mb-3">
	                    <input type="date" class="form-control" id="blockDate">
	                    <label for="blockDate">차단 일자</label>
	                </div>
	                <div class="form-floating mb-3">
	                    <textarea class="form-control" placeholder="차단 사유" id="manageReason" style="resize:none; height:100px;"></textarea>
	                    <label for="manageReason">차단 사유</label>
	                </div>
	            </div>
	           <div class="modal-footer flex-nowrap p-0">
	               <button type="button" class="btn btn-lg fs-6 col-6 py-3 m-0 rounded-0 border-end btn-danger text-white"><strong>차단하기</strong></button>
	               <button type="button" class="btn btn-lg fs-6 col-6 py-3 m-0 rounded-0" data-bs-dismiss="modal">아니요</button>
	           </div>
	           <div class="modal-footer flex-nowrap p-0">
	               <button type="button" class="btn btn-lg fs-6 col-6 py-3 m-0 rounded-0 border-end btn-success text-white"><strong>차단해제</strong></button>
	               <button type="button" class="btn btn-lg fs-6 col-6 py-3 m-0 rounded-0" data-bs-dismiss="modal">아니요</button>
	           </div>
	        </div>
	    </div>
	</div>
	
	<script>
	    window.onload=()=>{
	    	const blockBtnList = document.getElementsByClassName('blockBtn');
	    	for(const blockModal of blockBtnList){
	    		blockModal.addEventListener('click',()=>{
	    			$('#modalBlock').modal('show');
	    		});
	    	}
		}
	</script>
</body>
</html>
