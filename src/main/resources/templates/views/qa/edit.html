<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}">
    <meta charset="UTF-8">
    <style>
       
        .qa-layout { margin-left: 350px; margin-right: 350px; min-width: 600px; }
        
        .qa-table th { background-color: #f8f9fa !important; text-align: center; width: 15%; border: 1px solid #dee2e6; }
        .qa-table td { padding: 12px 20px !important; border: 1px solid #dee2e6; }
        
        .edit-input { 
            width: 100%; border: 1px solid #ced4da; border-radius: 4px; 
            padding: 10px; outline-color: #198754; 
        }
        
        .edit-textarea { 
            width: 100%; min-height: 500px; padding: 30px; 
            border: 1px solid #ced4da; border-radius: 4px; 
            resize: none; outline-color: #198754;
            line-height: 1.8; font-size: 1.05rem;
        }
        .info-label { color: #6c757d; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{views/common/navbar :: navbar}"></div>
	
    <div class="container py-5">      
        <div class="qa-layout bg-white p-5 rounded shadow-sm">
            <h2 class="do-hyeon-regular text-center mb-5">질의응답 수정하기</h2>

            <form action="/qa/update" method="POST">
                <input type="hidden" name="qIndex" th:value="${q.qIndex}"/>
                <input type="hidden" name="page" th:value="${page}"/>
                
               <table class="table qa-table mb-4">
				    <tr>
				       <th style="width: 15%; vertical-align: middle;">제목</th>
        		   		<td colspan="3">
            				<input type="text" class="form-control" id="boardTitle" name="boardTitle" th:value="${q.title}" placeholder="제목을 입력하세요" required/>
       			 	   	</td>

				    </tr>
				    <tr>
				        <th>작성자</th>
				        <td style="width: 35%;">
				            <span th:text="${q.userId}">작성자ID</span>				           
				        </td>
				        <th style="width: 15%;">자격증</th>
				        <td style="width: 35%;">
				            <span th:text="${q.licenseName}">자격증명</span>
				        </td>
				    </tr>
				    <tr>
				        <td colspan="4" style="padding: 0 !important; border: none;">
				            <div class="input-group">
				                <span class="input-group-text justify-content-center" 
				                      style="width: 15%; background-color: #e9ecef; color: #495057; font-weight: bold;">
				                    게시글
				                </span>
				                <textarea name="content" class="form-control" 
				                          style="min-height: 500px; padding: 20px; resize: none; border-radius: 0 4px 4px 0;" 
				                          placeholder="내용을 입력하세요" required>[[${q.content}]]</textarea>
				            </div>
				        </td>
				    </tr>
				</table>

                <div class="text-center mt-5 mb-3 d-grid gap-2 d-md-block">
                    <button type="submit" class="btn btn-success px-5 py-2 me-2">
                        수정하기
                    </button>
                    <button type="button" class="btn btn-secondary px-5 py-2" onclick="javascript:history.back();">
                        취소하기
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{views/common/footer :: footer}"></footer>
</body>
</html>
