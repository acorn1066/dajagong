<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 화면</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<style>
html, body {
    height: 100%;
}

body {
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(
        to top,
        #a8e6f7 0%,
        #dff4fd 40%,
        #ffffff 80%,
        #ffffff 100%
    );
}

.input-form {
    max-width: 680px;
    margin: 80px auto 0;
    padding: 32px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.form-control:focus {
    border-color: #a8e6f7;
    box-shadow: 0 0 0 0.2rem rgba(168, 230, 247, 0.25);
}
</style>
</head>

<body>
	<div class="container">
		<div class="d-flex justify-content-center">
			<img class="w-50" style="margin-bottom: -10%; margin-top: -3%; cursor: pointer;" src="/img/dajagong-logo.svg" onclick="location.href='/'">
		</div>
		<div class="input-form mx-auto">
			<h4 class="mb-3">회원가입</h4>
			<form class="validation-form" action="/enroll" method="post" id="enrollForm">
				<div class="row">
					<div class="col-md-6 mb-3">
						<label for="id">아이디</label> <input type="text" class="form-control" id="id" name="userId" autocomplete="username" required>
						<div class="invalid-feedback">아이디를 입력해주세요.</div>
						<div class="valid-feedback"></div>
					</div>
					
					<div class="col-md-6 mb-3">
						<label for="nickname">닉네임</label> <input type="text" class="form-control" id="nickname" name="nickname" required>
						<div class="invalid-feedback">닉네임을 입력해주세요.</div>
						<div class="valid-feedback"></div>
					</div>
				</div>

				<div class="mb-3">
					<label for="pwd">비밀번호</label> <input type="password" class="form-control" id="pwd" name="pwd" autocomplete="new-password" required>
					<div class="invalid-feedback">비밀번호를 입력해주세요.</div>
				</div>

				<div class="mb-3">
					<label for="pwdConfirm">비밀번호 확인<span class="text-muted">&nbsp;</span></label> <input type="password" class="form-control" id="pwdConfirm" name="pwdConfirm" required>
					<div class="invalid-feedback">비밀번호 확인을 입력해주세요.</div>
				</div>

				<div class="mb-3">
					<label for="email">이메일</label> <input type="email" class="form-control" id="email" name="email" autocomplete="email" placeholder="you@example.com" required>
					<div class="invalid-feedback">이메일을 입력해주세요.</div>
				</div>
				<div class="mb-3">
					<label for="phone">전화번호</label> <input type="tel" class="form-control" id="phone" name="phone" autocomplete="tel" placeholder="010-1234-1234" maxlength="13" required>
					<div class="invalid-feedback">전화번호를 입력해주세요.</div>
				</div>
				<div class="text-center mt-4">
					<button class="btn btn-primary w-50" type="submit">가입 완료</button>
				</div>
			</form>
		</div>
	</div>
	<script>
		// 폼 유효성 검사
		window.addEventListener('load', () => {

		    const forms = document.getElementsByClassName('validation-form');

		    Array.from(forms).forEach((form) => {

		        form.addEventListener('submit', function (event) {

		            let pwdInput = document.getElementById("pwd");
		            let pwdConfirmInput = document.getElementById("pwdConfirm");
		            let phoneInput = document.getElementById("phone");

		            let phone = phoneInput.value.replace(/[^0-9]/g, '');

		            // 기존 invalid 상태 제거
		            pwdConfirmInput.classList.remove('is-invalid');
		            phoneInput.classList.remove('is-invalid');

		            // 기본 required 검사
		            if (form.checkValidity() === false) {
		                event.preventDefault();
		                event.stopPropagation();
		                form.classList.add('was-validated');
		                return;
		            }

		            // 비밀번호 일치 검사
		            if (pwdInput.value !== pwdConfirmInput.value) {
		                event.preventDefault();
		                pwdConfirmInput.classList.add('is-invalid');
		                pwdConfirmInput.nextElementSibling.innerText = '비밀번호가 일치하지 않습니다.';
		                pwdConfirmInput.focus();
		                return;
		            }

		            if(!isIdValid || !isNicknameValid){
		                event.preventDefault();
		                
						// id 중복 검사를 위해 submit 막기
			            if(!isIdValid){
			                let idInput = document.getElementById("id");
			                
			                idInput.classList.add("is-invalid");
			                idInput.nextElementSibling.innerText = "아이디를 다시 확인하세요.";
			                idInput.focus();
			            }
						
			         	// nickname 중복 검사
			            if(!isNicknameValid){
			                let nicknameInput = document.getElementById("nickname");
	
			                nicknameInput.classList.add("is-invalid");
			                nicknameInput.nextElementSibling.innerText = "닉네임을 다시 확인하세요.";
			                nicknameInput.focus();
			            }
		                return;
		            }
		         
		            // 전화번호 검사
		            if (!/^\d{10,11}$/.test(phone)) {
		                event.preventDefault();
		                phoneInput.classList.add('is-invalid');
		                phoneInput.nextElementSibling.innerText = "전화번호를 다시 확인하세요.";
		                phoneInput.focus();
		                return;
		            }
		            form.classList.add('was-validated');
		        }, false);
		    });
		}, false);
	</script>

	<script>
	// 전화번호 형식 제한
	document.getElementById('phone').addEventListener('input', function(e) {

	    // 숫자만 남기기
	    let value = e.target.value.replace(/[^0-9]/g, '');

	    // 전화번호 형식 적용
	    if(value.length < 4) {
	        value = value;
	    } else if(value.length < 7) {
	        value = value.replace(/(\d{3})(\d+)/, '$1-$2');
	    } else if(value.length < 11) {
	        value = value.replace(/(\d{3})(\d{3})(\d+)/, '$1-$2-$3');
	    } else {
	        value = value.replace(/(\d{3})(\d{4})(\d+)/, '$1-$2-$3');
	    }
	    e.target.value = value;
	});
	</script>
	
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script>
    let isIdValid = false;
	let timer;
	let isNicknameValid = false;
	let nicknameTimer;

	window.addEventListener('load', () => {

		// id 중복 검사
		document.getElementById('id').addEventListener('input', e => {
			
	        clearTimeout(timer);
	        
	        const idInput = e.target;
	        const userId = idInput.value.trim();

	        const invalidFeedback = idInput.parentElement.querySelector(".invalid-feedback");
	        const validFeedback = idInput.parentElement.querySelector(".valid-feedback");
		
	        // 기존 상태 제거
	        idInput.classList.remove("is-invalid", "is-valid");
	        isIdValid = false;
	        
	        // 빈값
	        if(userId == ''){
				idInput.classList.add('is-invalid');
				invalidFeedback.innerText = "아이디를 입력해주세요.";
				return;
			}	       
	        
	        // 형식 검사
	        const regExp = /^[a-zA-Z0-9]{4,12}$/;
	        if(!regExp.test(userId)){
	            idInput.classList.add("is-invalid");
	            invalidFeedback.innerText = "아이디는 영문/숫자 4~12자로 입력하세요.";
	            return;
	        }
	        
	        // debounce : 호출을 지연시켜 연속 검사하지 않고 한번만 검사하게 하여 서버 부담을 줄이는 기법
	        timer = setTimeout(() => {
	
	            $.ajax({
	                url : "/checkId",
	                data : {userId : userId},
	                success : function(result){
	                    if(result === "exist"){
	                        idInput.classList.add("is-invalid");
	                        invalidFeedback.innerText = "이미 사용중인 아이디입니다.";
	                    }else{
	                        idInput.classList.add("is-valid");
	                        validFeedback.innerText = "사용 가능한 아이디입니다.";
	                        isIdValid = true;
	                    }
	                },
	                error : function(){
	                	console.log("중복 검사 실패");
	                }
	            });
	        }, 500);
		});
		
		// nickname 중복 검사
	    document.getElementById('nickname').addEventListener('input', e => {

	        clearTimeout(nicknameTimer);

	        const nicknameInput = e.target;
	        const nickname = nicknameInput.value.trim();
	        const userId = document.getElementById("id").value;
	        
	        const invalidFeedback = nicknameInput.parentElement.querySelector(".invalid-feedback");
	        const validFeedback = nicknameInput.parentElement.querySelector(".valid-feedback");

	        // 상태 제거
	        nicknameInput.classList.remove("is-invalid", "is-valid");
	        isNicknameValid = false;

	        // 빈값
	        if(nickname === ''){
	            nicknameInput.classList.add("is-invalid");
	            invalidFeedback.innerText = "닉네임을 입력해주세요.";
	            return;
	        }

	        // 형식 검사
	        // 한글/영문/숫자 2~10자
	        const regExp = /^[가-힣a-zA-Z0-9]{2,10}$/;

	        if(!regExp.test(nickname)){
	            nicknameInput.classList.add("is-invalid");
	            invalidFeedback.innerText = "닉네임은 2~10자의 한글, 영문, 숫자만 가능합니다.";
	            return;
	        }

	        // debounce
	        nicknameTimer = setTimeout(() => {

	            $.ajax({
	                url : "/checkNickname",
	                data : {userId:userId, nickname : nickname},
	                success : function(result){
	                    if(result === "exist"){
	                        nicknameInput.classList.add("is-invalid");
	                        invalidFeedback.innerText = "이미 사용중인 닉네임입니다.";
	                    }else{
	                        nicknameInput.classList.add("is-valid");
	                        validFeedback.innerText = "사용 가능한 닉네임입니다.";
	                        isNicknameValid = true;
	                    }
	                },
	                error : function(){
	                    console.log("닉네임 중복 검사 실패");
	                }
	            });
	        }, 500);
	    });
	});
	</script>
</body>
</html>
