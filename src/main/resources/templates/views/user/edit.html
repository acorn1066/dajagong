<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원수정 화면</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<style>
html, body {
    height: 100%;
}

body {
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(
        to top,
        #b7f0c2 0%,
        #e3f9e7 40%,
        #ffffff 80%,
        #ffffff 100%
    );
}

.input-form {
    max-width: 680px;
    margin: 80px auto 0;
    padding: 32px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.form-control:focus {
    border-color: #9be7a8;
    box-shadow: 0 0 0 0.2rem rgba(155, 231, 168, 0.25);
}
</style>
</head>

<body>
	<div class="container">
		<div class="d-flex justify-content-center">
			<img class="w-50" style="margin-bottom: -10%; margin-top: -3%; cursor: pointer;" src="/img/dajagong-logo.svg" onclick="location.href='/'">
		</div>
		<div class="input-form mx-auto">
			<h4 class="mb-3">회원가입</h4>
			<form class="validation-form" action="/edit" method="post" id="editForm">
				<div class="row">
					<div class="col-md-6 mb-3">
						<label for="id">아이디</label> <input type="text" class="form-control" id="id" name="userId" autocomplete="username" style="background: lightgray" th:value="${session.loginUser.userId}" readonly>
					</div>
					<div class="col-md-6 mb-3">
						<label for="nickname">별명</label> <input type="text" class="form-control" id="nickname" name="nickname" th:value="${session.loginUser.nickname}" required>
						<div class="invalid-feedback">별명을 입력해주세요.</div>
					</div>
				</div>


				<div class="mb-3">
					<label for="pwd">비밀번호</label> <input type="password" class="form-control" id="pwd" name="pwd" autocomplete="new-password" required>
					<div class="invalid-feedback">비밀번호를 입력해주세요.</div>
				</div>

				<div class="mb-3">
					<label for="pwdConfirm">비밀번호 확인<span class="text-muted">&nbsp;</span></label> <input type="password" class="form-control" id="pwdConfirm" name="pwdConfirm" required>
					<div class="invalid-feedback">비밀번호 확인을 입력해주세요.</div>
				</div>

				<div class="mb-3">
					<label for="email">이메일</label> <input type="email" class="form-control" id="email" name="email" autocomplete="email" placeholder="you@example.com" th:value="${session.loginUser.email}" required>
					<div class="invalid-feedback">이메일을 입력해주세요.</div>
				</div>
				<div class="mb-3">
					<label for="phone">전화번호</label> <input type="tel" class="form-control" id="phone" name="phone" pattern="010-[0-9]{4}-[0-9]{4}" autocomplete="tel" placeholder="010-1234-1234" th:value="${session.loginUser.phone}" required>
					<div class="invalid-feedback">전화번호를 입력해주세요.</div>
				</div>
				<div class="d-flex justify-content-center">
					<button class="btn btn-success w-25 mr-3" type="button" onclick="checkPwd()">수정 완료</button>
					<button class="btn btn-secondary w-25" type="button" onclick="location.href='/'">홈으로</button>
				</div>
			</form>
		</div>
	</div>
	<script>
		window.addEventListener('load', () => {
		  const forms = document.getElementsByClassName('validation-form');
		
		  Array.from(forms).forEach((form) => {
		    form.addEventListener('submit', function (event) {
		      if (form.checkValidity() === false) {
		        event.preventDefault();
		        event.stopPropagation();
		      }
		
		      form.classList.add('was-validated');
		    }, false);
		  });
		}, false);
		
		 function checkPwd() {

		        let pwd = document.getElementById("pwd").value;
		        let pwdConfirm = document.getElementById("pwdConfirm").value;

		        if(pwd === ''){
		        	alert("새 비밀번호를 입력해주십시오.");
		        	return
		        } else if (pwdConfirm === '') {
		            alert("비밀번호 확인을 입력해주십시오.");
		            return
		        } else if (pwd !== pwdConfirm) {
		            alert("비밀번호가 일치하지 않습니다.");
		            return;
		        }

		        document.getElementById("editForm").submit();
	    }
	</script>



</body>
</html>
