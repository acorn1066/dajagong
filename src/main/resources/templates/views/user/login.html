<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<style>
html, body {
	height: 100%;
}

body {
	min-height: 100vh;
	margin: 0;
	background: linear-gradient(to top, #a8e6f7 0%, #dff4fd 40%, #ffffff 80%, #ffffff
		100%);
}

.input-form {
	max-width: 680px;
	margin: 80px auto 0;
	padding: 32px;
	background: #ffffff;
	border-radius: 10px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.form-control:focus {
	border-color: #a8e6f7;
	box-shadow: 0 0 0 0.2rem rgba(168, 230, 247, 0.25);
}

#loginFailArea {
	min-height: 24px;
	opacity: 1;
	transition: opacity 0.5s ease;
}
</style>
</head>
<body>
	<div class="container">
		<div class="d-flex justify-content-center">
			<img class="w-50" style="margin-bottom: -10%; margin-top: -3%; cursor: pointer;" src="/img/dajagong-logo.svg" onclick="location.href='/'">
		</div>
		<div class="input-form mx-auto">
			<h4 class="mb-3">로그인</h4>
			<form class="validation-form" action="/signIn" method="post">
				<div class="row">
					<div class="col-md-12 mb-3">
						<label for="id">아이디</label> <input type="text" class="form-control" id="id" name="userId" autocomplete="username" maxlength="15" required>
						<div class="invalid-feedback">아이디를 입력해주세요.</div>
					</div>
				</div>
				<div class="row">
					<div class="col-md-12 mb-3">
						<label for="pwd">비밀번호</label> <input type="password" class="form-control" id="pwd" name="pwd" maxlength="20" required>
						<div class="invalid-feedback">비밀번호를 입력해주세요.</div>
					</div>
				</div>

				<div class="d-flex justify-content-center">
					<button class="btn btn-primary w-25 mr-3" type="submit">로그인</button>
					<button class="btn btn-secondary w-25" type="button" onclick="location.href='/enroll'">회원가입</button>
				</div>
			</form>

			<br/>

			<div id="loginFailArea" class="text-danger text-center mb-3">
				<span th:text="${errorMsg}"></span>
			</div>

		</div>
	</div>
	<script>
		window.addEventListener('load', () => {
		  const forms = document.getElementsByClassName('validation-form');
		
		  Array.from(forms).forEach((form) => {
		    form.addEventListener('submit', function (event) {
		      if (form.checkValidity() === false) {
		        event.preventDefault();
		        event.stopPropagation();
		      }
		
		      form.classList.add('was-validated');
		    }, false);
		  });
		}, false);
		
		// 비밀번호 공백 입력 시 자동제거
		const pwd = document.getElementById("pwd");

		pwd.addEventListener("input", () => {
		    pwd.value = pwd.value.replace(/\s/g, '');
		});
	</script>

	<script th:if="${errorMsg}"> <!-- 로그인 실패 에러메시지를 5초간만 띄우게 하는 스크립트 -->
    setTimeout(() => {

        const errorArea =
            document.getElementById('loginFailArea');

        if(errorArea){
            errorArea.style.opacity = '0';
        }

    }, 3000);
</script>
</body>
</html>
