<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

<style>
html, body {
	height: 100%;
}

body {
	min-height: 100vh;
	margin: 0;
	background: linear-gradient(to top, #b7f0c2 0%, #e3f9e7 40%, #ffffff 80%, #ffffff
		100%);
}

.input-form {
	max-width: 680px;
	margin: 80px auto 0;
	padding: 32px;
	background: #ffffff;
	border-radius: 10px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.form-control:focus {
	border-color: #9be7a8;
	box-shadow: 0 0 0 0.2rem rgba(155, 231, 168, 0.25);
}

#delete {
	color: lightgray;
}

#delete:hover {
	color: gray;
	cursor: pointer;
}
</style>
</head>

<body>
	<div class="container">
		<div class="d-flex justify-content-center">
			<img class="w-50" style="margin-bottom: -10%; margin-top: -3%; cursor: pointer;" src="/img/dajagong-logo.svg" onclick="location.href='/'">
		</div>
		<div class="input-form mx-auto">
			<h4 class="mb-3">회원가입</h4>
			<form class="validation-form">
				<div class="row">
					<div class="col-md-6 mb-3">
						<label for="id">아이디</label> <input type="text" class="form-control" id="id" name="id" autocomplete="username" th:value="${session.loginUser.userId}" readonly>
					</div>
					<div class="col-md-6 mb-3">
						<label for="nickname">별명</label> <input type="text" class="form-control" id="nickname" name="nickname" th:value="${session.loginUser.nickname}" readonly>
						<div class="invalid-feedback">별명을 입력해주세요.</div>
					</div>
				</div>

				<div class="mb-3">
					<label for="email">이메일</label> <input type="email" class="form-control" id="email" name="email" autocomplete="email" placeholder="you@example.com" th:value="${session.loginUser.email}" readonly>
					<div class="invalid-feedback">이메일을 입력해주세요.</div>
				</div>
				<div class="mb-3">
					<label for="phone">전화번호</label> <input type="tel" class="form-control" id="phone" name="phone" pattern="[0-9]{10,11}" autocomplete="tel" placeholder="010-1234-1234" th:value="${session.loginUser.phone}" readonly>
					<div class="invalid-feedback">전화번호를 입력해주세요.</div>
				</div>
				<div class="d-flex justify-content-center">
					<button class="btn btn-success w-25 mr-3" type="button" onclick="location.href='/edit'">수정하기</button>
					<button class="btn btn-secondary w-25" type="button" onclick="location.href='/'">홈으로</button>
				</div>
				<br />
				<div class="d-flex justify-content-center">
					<label id="delete" onm>> 탈퇴하기</label>
				</div>
			</form>
		</div>
	</div>

	<div class="modal fade" tabindex="-1" role="dialog" id="modalChoice">
		<div class="modal-dialog" role="document">
			<div class="modal-content rounded-3 shadow">
				<div class="modal-body p-4 text-center">
					<h3 class="mb-0">정말로 탈퇴하시겠습니까?</h3>
					<p class="mb-0">탈퇴 후 계정은 복구할 수 없습니다.</p>
				</div>
				<div class="modal-footer flex-nowrap p-0">
					<button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 m-0 rounded-0 border-end" onclick="location.href='/delete'">
						<strong>네</strong>
					</button>
					<button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 m-0 rounded-0" data-dismiss="modal">아니오</button>
				</div>
			</div>
		</div>
	</div>

	<script>
		window.addEventListener('load', () => {
		  const forms = document.getElementsByClassName('validation-form');
		
		  Array.from(forms).forEach((form) => {
		    form.addEventListener('submit', function (event) {
		      if (form.checkValidity() === false) {
		        event.preventDefault();
		        event.stopPropagation();
		      }
		
		      form.classList.add('was-validated');
		    }, false);
		  });
		}, false);

		window.onload = () => {
			
			document.getElementById('delete').addEventListener('click', ()=>{
				$('#modalChoice').modal('show');	
			});
			
			document.getElementById('delete').addEventListener('hover', () => {
				
			});
		}
		
		
	</script>

	



</body>
</html>
